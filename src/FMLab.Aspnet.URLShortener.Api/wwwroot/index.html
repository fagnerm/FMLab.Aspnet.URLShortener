<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@700;800&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            background: #f5f2eb;
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #c8f56a;
            top: -100px;
            right: -80px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #f0a8ff;
            bottom: -80px;
            left: -60px;
        }

        .wrapper {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            color: #c8f56a;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 1.5rem;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background: #c8f56a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(42px, 8vw, 64px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            color: #1a1a1a;
            margin-bottom: 0.4rem;
        }

            h1 span {
                color: transparent;
                -webkit-text-stroke: 2px #1a1a1a;
            }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #888;
            margin-bottom: 2.5rem;
        }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

            .card::before {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                width: 180px;
                height: 180px;
                background: #c8f56a;
                border-radius: 50%;
                opacity: 0.06;
                transform: translate(40%, -40%);
            }

        .field {
            margin-bottom: 1.25rem;
        }

        .field-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: #555;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            pointer-events: none;
            user-select: none;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            background: #252525;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 13px 14px 13px 36px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #f0f0ee;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

            input[type="url"]:focus,
            input[type="text"]:focus {
                border-color: #c8f56a;
                box-shadow: 0 0 0 3px rgba(200,245,106,0.12);
            }

        input::placeholder {
            color: #444;
        }

        .hint {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #555;
            margin-top: 5px;
        }

        .alias-status {
            position: absolute;
            right: 12px;
            font-size: 15px;
            line-height: 1;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #2e2e2e;
        }

        .divider-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #444;
            letter-spacing: 0.1em;
        }

        button[type="submit"] {
            width: 100%;
            background: #c8f56a;
            color: #1a1a1a;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.1s, background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

            button[type="submit"]:hover {
                background: #d4f77e;
            }

            button[type="submit"]:active {
                transform: scale(0.98);
            }

        .arrow {
            font-size: 18px;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover .arrow {
            transform: translateX(4px);
        }

        .footer-note {
            margin-top: 1.25rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #555;
            letter-spacing: 0.05em;
        }

        .btn-analytics {
            width: 100%;
            background: transparent;
            color: #888;
            border: 1px solid #2e2e2e;
            border-radius: 10px;
            padding: 13px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-analytics:hover { border-color: #555; color: #ccc; }
        .btn-analytics:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="wrapper">
        <div class="badge">
            <span class="badge-dot"></span>
            online
        </div>

        <h1>Encurte.<br><span>Compartilhe.</span></h1>
        <p class="tagline">// links curtos.</p>

        <div class="card">
            <form method="post" action="/">
                <input type="hidden" name="{ANTIFORGERY_FIELD_NAME}" value="{ANTIFORGERY_TOKEN}" />

                <div class="field">
                    <label class="field-label" for="url">URL de destino</label>
                    <div class="input-wrap">
                        <span class="input-icon">&rarr;</span>
                        <input type="url" id="url" name="url" placeholder="https://url-longa.com/com/varios/segmentos" required />
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="alias">Alias <span style="color:#444">(opcional)</span></label>
                    <div class="input-wrap">
                        <span class="input-icon" style="font-size:11px;color:#555">~/</span>
                        <input type="text" id="alias" name="alias" placeholder="meu-link" pattern="[a-zA-Z0-9\-]+" autocomplete="off" />
                        <span class="alias-status" id="alias-status"></span>
                    </div>
                    <p class="hint" id="alias-hint">letras, números e hífens · máx. 15 caracteres</p>
                </div>

                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">pronto</span>
                    <span class="divider-line"></span>
                </div>

                <button type="submit">
                    Gerar link
                    <span class="arrow">→</span>
                </button>
            </form>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">analytics</span>
                <span class="divider-line"></span>
            </div>

            <div class="field">
                <label class="field-label" for="analytics-hash">Ver estatísticas de um link</label>
                <div class="input-wrap">
                    <span class="input-icon" style="font-size:11px;color:#555">~/</span>
                    <input type="text" id="analytics-hash" placeholder="hash ou link encurtado" />
                </div>
                <p class="hint" id="analytics-hint"></p>
            </div>
            <button type="button" onclick="goToAnalytics()" class="btn-analytics">
                Ver estatísticas
                <span class="arrow">↗</span>
            </button>
        </div>
    </div>

    <script>
        (() => {
            const aliasInput  = document.getElementById('alias');
            const aliasStatus = document.getElementById('alias-status');
            const aliasHint   = document.getElementById('alias-hint');
            const ALIAS_RE    = /^[a-zA-Z0-9\-]{1,15}$/;

            let debounceTimer = null;

            function setStatus(state) {
                // state: '' | 'checking' | 'available' | 'taken' | 'invalid'
                aliasStatus.textContent = '';
                aliasHint.style.color   = '#555';
                aliasHint.textContent   = 'letras, números e hífens · máx. 15 caracteres';

                if (state === 'checking') {
                    aliasStatus.textContent = '...';
                    aliasStatus.style.color = '#888';
                } else if (state === 'available') {
                    aliasHint.style.color   = '#7ed957';
                    aliasHint.textContent   = 'disponível';
                } else if (state === 'taken') {
                    aliasHint.style.color   = '#e05555';
                    aliasHint.textContent   = 'alias já está em uso';
                } else if (state === 'invalid') {
                    aliasHint.style.color   = '#e05555';
                    aliasHint.textContent   = 'apenas letras, números e hífens · máx. 15 caracteres';
                }
            }

            aliasInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                const value = aliasInput.value.trim();

                if (!value) { setStatus(''); return; }
                if (!ALIAS_RE.test(value)) { setStatus('invalid'); return; }

                setStatus('checking');

                debounceTimer = setTimeout(async () => {
                    try {
                        const res = await fetch(`/api/v1/aliases/check?value=${encodeURIComponent(value)}`);
                        if (!res.ok) { setStatus(''); return; }
                        const taken = await res.json();
                        setStatus(taken ? 'taken' : 'available');
                    } catch {
                        setStatus('');
                    }
                }, 450);
            });
        })();

        function extractHash(input) {
            try {
                const url = new URL(input);
                const segments = url.pathname.split('/').filter(Boolean);
                return segments[segments.length - 1] || null;
            } catch {
                return input || null;
            }
        }

        function goToAnalytics() {
            const input = document.getElementById('analytics-hash').value.trim();
            const hint  = document.getElementById('analytics-hint');

            if (!input) {
                hint.style.color = '#e05555';
                hint.textContent = 'informe um hash ou link encurtado';
                return;
            }

            const hash = extractHash(input);

            if (!hash) {
                hint.style.color = '#e05555';
                hint.textContent = 'link inválido';
                return;
            }

            hint.textContent = '';
            window.location.href = '/analytics/' + hash;
        }

        document.getElementById('analytics-hash').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') goToAnalytics();
        });

        document.getElementById('analytics-hash').addEventListener('input', function () {
            document.getElementById('analytics-hint').textContent = '';
        });
    </script>
</body>
</html>
