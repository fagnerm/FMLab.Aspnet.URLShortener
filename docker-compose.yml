x-api: &api-base
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ApiKey: ${API_KEY}
      Redis:Host: ${REDIS_HOST}
      Redis:Port: ${REDIS_PORT}
      AWS:AccessKey: ${AWS_ACCESS_KEY_ID}
      AWS:SecretKey: ${AWS_SECRET_ACCESS_KEY}
      AWS:ServiceUrl: ${AWS_SERVICE_URL}
      AWS:Region: ${AWS_REGION}
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

services:

  api1:
    <<: *api-base
    container_name: api1
  api2:
    <<: *api-base
    container_name: api2

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - app-network
    restart: unless-stopped

  dynamodb:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    networks:
      - app-network

  dynamodb-init:
    image: amazon/aws-cli
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    entrypoint: >
      sh -c "sleep 2 && aws dynamodb create-table --table-name url_redirections --attribute-definitions AttributeName=hash,AttributeType=S --key-schema AttributeName=hash,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb:8000"
    networks:
      - app-network
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
